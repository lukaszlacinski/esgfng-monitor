<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ESGF-NG Monitor{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1a1f24;
      --muted: #5c6670;
      --border: #d8dee4;
      --ok: #1a7f37;
      --ok-bg: #dafbe1;
      --warn: #9a6700;
      --warn-bg: #fff8c5;
      --error: #cf222e;
      --error-bg: #ffebe9;
      --link: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    header p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .badge-ok { background: var(--ok-bg); color: var(--ok); }
    .badge-warn { background: var(--warn-bg); color: var(--warn); }
    .badge-error { background: var(--error-bg); color: var(--error); }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
    }
    .chart-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .chart-toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .axis-btn {
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
    }
    .axis-btn:hover { background: var(--bg); }
    .chart-wrap { height: 280px; margin-top: 0.25rem; }
    .stats-wrap {
      margin-top: 1rem;
      overflow-x: auto;
    }
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .section-heading {
      margin: 1rem 0 0.35rem;
      font-size: 0.95rem;
    }
    .stats-table th,
    .stats-table td {
      border: 1px solid var(--border);
      padding: 0.35rem 0.5rem;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .stats-table thead th {
      background: var(--bg);
      font-weight: 600;
      text-align: right;
    }
    .stats-table tbody th {
      background: var(--bg);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
    }
    .target-header { margin-bottom: 0.25rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="/">ESGF-NG Monitor</a></h1>
    <p>Healthcheck probe results</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
